# 使用 GitHub Actions 自动构建的镜像，无需本地 build
# 镜像: ghcr.io/lidachui1998/nianyu (推送 main 或打 tag 后自动发布)
# 首次使用: docker pull ghcr.io/lidachui1998/nianyu:latest

version: "3.8"

services:
  nianyu:
    image: ghcr.io/lidachui1998/nianyu:latest
    container_name: nianyu
    network_mode: host
    volumes:
      # 持久化：数据存放在部署目录下的 ./data，重启/重建容器不丢失
      - ./data:/app/data
    environment:
      - PORT=13007
      # GD music API endpoint (search/lyric/url). Override if the default is blocked on your NAS.
      - GD_API=${GD_API:-https://music-api.gdstudio.xyz/api.php}
      # Force IPv4 first if your NAS has broken IPv6 connectivity.
      - NODE_OPTIONS=--dns-result-order=ipv4first
      # 网易云 API：从 .env 或环境变量读取，不写死。例如 .env 中写 NETEASE_API=http://127.0.0.1:13006（用下方 netease-api 时）
      - NETEASE_API=${NETEASE_API:-http://127.0.0.1:13006}
      - SESSION_SECRET=${SESSION_SECRET:-nianyu-session-secret-change-me}
    # If DNS resolution fails on NAS, uncomment and use public DNS
    # dns:
    #   - 1.1.1.1
    #   - 8.8.8.8
    depends_on:
      - netease-api
    restart: unless-stopped

  # 内置网易云 API（与 Binaryify/NeteaseCloudMusicApi 兼容）
  # 若改用外部 API，在 nianyu 的 environment 中设置 NETEASE_API 并注释掉本服务与 depends_on
  netease-api:
    image: moefurina/ncm-api:latest
    container_name: netease-api
    ports:
      - "13006:3000"
    restart: unless-stopped
