version: "3.8"

services:
  nianyu:
    build: .
    image: nianyu:latest
    container_name: nianyu
    ports:
      - "5174:5174"
    environment:
      - PORT=5174
      - NETEASE_API=http://netease-api:3000
      - SESSION_SECRET=nianyu-session-secret-change-me
    depends_on:
      - netease-api
    restart: unless-stopped

  netease-api:
    image: moefurina/ncm-api:latest
    container_name: netease-api
    ports:
      - "3000:3000"
    restart: unless-stopped
